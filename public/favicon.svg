<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Circular green background (makes the favicon look round, not square) -->
  <circle cx="50" cy="50" r="49" fill="#1a8a30"/>

  <!-- White face -->
  <circle cx="50" cy="55" r="36" fill="white"/>

  <!-- Green pointed ear (top left) -->
  <polygon points="32,22 25,4 46,19" fill="#1a8a30"/>
  <!-- Ear inner -->
  <polygon points="32,20 27,8 43,19" fill="#52c25a"/>

  <!-- Eye (large, expressive) -->
  <circle cx="43" cy="40" r="13" fill="white" stroke="#111" stroke-width="2"/>
  <circle cx="45" cy="42" r="7" fill="#111"/>
  <circle cx="48" cy="39" r="2.5" fill="white"/>

  <!-- Nose / cheek bump -->
  <circle cx="63" cy="35" r="6" fill="#52c25a" stroke="#1a8a30" stroke-width="1.5"/>

  <!-- Left cheek spiky fur -->
  <polygon points="15,53 8,42 19,40" fill="#1a8a30"/>
  <polygon points="12,63 5,53 15,53" fill="#1a8a30"/>

  <!-- Right cheek spiky fur -->
  <polygon points="85,53 92,42 81,40" fill="#1a8a30"/>
  <polygon points="88,63 95,53 85,53" fill="#1a8a30"/>

  <!-- Open mouth (big smile) -->
  <path d="M20 63 Q50 96 80 63 L80 72 Q50 100 20 72 Z" fill="#111"/>
  <!-- Tongue -->
  <ellipse cx="50" cy="84" rx="17" ry="11" fill="#e0001a"/>
  <!-- Teeth -->
  <rect x="31" y="63" width="11" height="13" rx="3" fill="white"/>
  <rect x="44" y="63" width="11" height="13" rx="3" fill="white"/>
  <rect x="57" y="63" width="11" height="13" rx="3" fill="white"/>
</svg>